<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page de Démarrage</title>
    
    <!-- 1. Chargement du fichier de paramètres (DONNÉES) -->
    <script src="config.js"></script>
    
    <!-- 2. Chargement du fichier de style (DESIGN) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="search-container">
        <h1>Recherche Web</h1>
        
        <!-- Barre de recherche -->
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Entrez votre recherche..." autofocus>
            <select id="engineSelect">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="duckduckgo">DuckDuckGo</option>
            </select>
        </div>
        <button class="search-btn" onclick="performSearch()">Rechercher</button>

        <!-- Conteneur où les boutons seront générés automatiquement -->
        <div id="shortcutsContainer" class="shortcuts-grid"></div>
    </div>

    <script>
        // --- LOGIQUE DE RECHERCHE ---
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            const engine = document.getElementById('engineSelect').value;
            
            if (query.trim() === "") {
                alert("Veuillez entrer un terme de recherche.");
                return;
            }

            let url = "";
            if (engine === "google") {
                url = "https://www.google.com/search?q=" + encodeURIComponent(query);
            } else if (engine === "bing") {
                url = "https://www.bing.com/search?q=" + encodeURIComponent(query);
            } else if (engine === "duckduckgo") {
                url = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
            }

            window.open(url, '_blank');
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // --- LOGIQUE DE GÉNÉRATION DES RACCOURCIS ---
        // Cette fonction s'exécute au chargement de la page
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('shortcutsContainer');
            
            // Vérifie que la variable config est bien chargée
            if (typeof shortcutsConfig !== 'undefined') {
                
                // Boucle sur chaque élément du tableau config
                shortcutsConfig.forEach(item => {
                    // Création du lien HTML
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = 'shortcut-btn';
                    link.target = '_blank'; // Ouvre dans un nouvel onglet
                    
                    // Contenu du bouton (une icône générique + le titre)
                    link.innerHTML = `
                        <span class="shortcut-icon">🔗</span>
                        <span>${item.title}</span>
                    `;
                    
                    // Ajout au conteneur
                    container.appendChild(link);
                });
            } else {
                console.error("Le fichier config.js n'a pas été chargé ou la variable est manquante.");
            }
        });
    </script>

</body>
</html>
