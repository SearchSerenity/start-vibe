<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Page de Démarrage</title>
    
    <!-- 1. Chargement du fichier de paramètres -->
    <script src="config.js"></script>
    
    <!-- 2. Chargement du fichier de style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Éléments pour le fond d'écran -->
    <div id="background-image"></div>
    <div id="background-overlay"></div>

    <div class="search-container">
        <h1>Recherche Web</h1>
        
        <!-- Barre de recherche -->
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Entrez votre recherche..." autofocus>
            <select id="engineSelect">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="duckduckgo">DuckDuckGo</option>
            </select>
        </div>
        <button class="search-btn" onclick="performSearch()">Rechercher</button>

        <!-- Conteneur des raccourcis -->
        <div id="shortcutsContainer" class="shortcuts-grid"></div>
    </div>

    <script>
        // --- LOGIQUE DE RECHERCHE ---
        function performSearch() {
            const query = document.getElementById('searchInput').value;
            const engine = document.getElementById('engineSelect').value;
            
            if (query.trim() === "") {
                alert("Veuillez entrer un terme de recherche.");
                return;
            }

            let url = "";
            if (engine === "google") {
                url = "https://www.google.com/search?q=" + encodeURIComponent(query);
            } else if (engine === "bing") {
                url = "https://www.bing.com/search?q=" + encodeURIComponent(query);
            } else if (engine === "duckduckgo") {
                url = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
            }

            window.open(url, '_blank');
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        // --- LOGIQUE DE GÉNÉRATION DES RACCOURCIS ---
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('shortcutsContainer');
            
            if (typeof shortcutsConfig !== 'undefined') {
                shortcutsConfig.forEach(item => {
                    const link = document.createElement('a');
                    link.href = item.url;
                    link.className = 'shortcut-btn';
                    link.target = '_blank';
                    link.innerHTML = `
                        <span class="shortcut-icon">🔗</span>
                        <span>${item.title}</span>
                    `;
                    container.appendChild(link);
                });
            }

            // --- LOGIQUE DU FOND D'ÉCRAN UNSPLASH ---
            if (typeof unsplashConfig !== 'undefined' && unsplashConfig.accessKey !== "VOTRE_CLÉ_ICI") {
                const bgElement = document.getElementById('background-image');
                
                // Construction de l'URL API
                // On ajoute un timestamp pour éviter que le navigateur ne mette l'image en cache
                const timestamp = new Date().getTime();
                const keywordParam = unsplashConfig.keyword ? `&query=${encodeURIComponent(unsplashConfig.keyword)}` : '';
                const imageUrl = `https://api.unsplash.com/photos/random?client_id=${unsplashConfig.accessKey}&orientation=landscape${keywordParam}&t=${timestamp}`;

                // Utilisation de fetch pour récupérer l'URL de l'image (l'API renvoie un objet JSON avec l'URL)
                fetch(imageUrl)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Erreur API Unsplash');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // Appliquer l'image de fond
                        bgElement.style.backgroundImage = `url('${data.urls.full}')`;
                        console.log("Fond d'écran chargé :", data.alt_description);
                    })
                    .catch(error => {
                        console.error("Problème lors du chargement du fond d'écran:", error);
                        // En cas d'erreur (clé invalide ou quota dépassé), on met un fond gris par défaut
                        bgElement.style.backgroundColor = "#333";
                        alert("Erreur de chargement du fond d'écran. Vérifiez votre clé API dans config.js.");
                    });
            } else {
                console.log("Configuration Unsplash manquante ou clé non définie.");
            }
        });
    </script>

</body>
</html>
